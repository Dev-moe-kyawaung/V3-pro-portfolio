name: flutter_portfolio_starter
description: A premium ultra-modern Flutter portfolio starter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^15.1.1
  url_launcher: ^6.3.2
  json_annotation: ^4.9.0
  flutter_animate: ^4.5.2
  animated_text_kit: ^4.2.3
  scrollable_positioned_list: ^0.3.8
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.11.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
